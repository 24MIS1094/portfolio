<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arjun Yn | Portfolio</title>
    <!-- Fontshare General Sans & Premium Outfit -->
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700,800,900&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Progressive Web App / Fullscreen support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/images/WhatsApp%20Image%202026-02-08%20at%205.00.41%20PM.jpeg">
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fullscreen helper: attempt fullscreen on first user gesture (best-effort) -->
    <script>
      (function () {
        if (!('requestFullscreen' in document.documentElement)) return;
        try {
          // Only prompt once per device
          if (localStorage.getItem('pwa_fullscreen_auto')) return;
        } catch (e) {}

        function enableFullscreenOnce() {
          document.documentElement.requestFullscreen?.().catch(()=>{});
          try { localStorage.setItem('pwa_fullscreen_auto','1'); } catch(e){}
          removeListeners();
        }

        function removeListeners(){
          window.removeEventListener('touchstart', enableFullscreenOnce);
          window.removeEventListener('click', enableFullscreenOnce);
        }

        window.addEventListener('touchstart', enableFullscreenOnce, {passive:true});
        window.addEventListener('click', enableFullscreenOnce, {passive:true});
      })();
    </script>
  </body>
</html>
